definitions:
  pipeline.WireEvent:
    properties:
      data:
        type: object
      type:
        type: string
    type: object
  pipeline.commitRequest:
    properties:
      content:
        type: string
      session_id:
        type: string
    required:
    - content
    - session_id
    type: object
  pipeline.previewRequest:
    properties:
      content:
        type: string
      session_id:
        type: string
    required:
    - session_id
    type: object
  pipeline.previewResponse:
    properties:
      est_accuracy:
        type: string
      messages:
        items:
          $ref: '#/definitions/pipeline.previewResponseMessage'
        type: array
      session_id:
        type: string
      system:
        type: string
      system_usage:
        $ref: '#/definitions/pipeline.previewUsage'
      tool_count:
        type: integer
      total:
        $ref: '#/definitions/pipeline.previewUsage'
    type: object
  pipeline.previewResponseMessage:
    properties:
      content:
        type: string
      role:
        type: string
      usage:
        $ref: '#/definitions/pipeline.previewUsage'
    type: object
  pipeline.previewUsage:
    properties:
      bytes:
        type: integer
      est_tokens:
        type: integer
      runes:
        type: integer
    type: object
  pipeline.replayRequest:
    properties:
      model:
        type: string
      options_override:
        additionalProperties: {}
        type: object
    type: object
  pipeline.systemResetRequest:
    properties:
      plugins:
        items:
          type: string
        type: array
      system:
        type: string
      tools_verbosity:
        type: string
    type: object
  plugins.PluginDriverInfo:
    properties:
      args:
        items:
          type: string
        type: array
      config:
        additionalProperties: {}
        type: object
      enabled:
        type: boolean
      env:
        additionalProperties: {}
        type: object
      max_port:
        type: integer
      min_port:
        type: integer
      name:
        type: string
      path:
        type: string
      timeout:
        type: integer
      type:
        type: string
    type: object
  resource.patchResourceRequest:
    properties:
      metadata:
        additionalProperties: {}
        type: object
      tags:
        items:
          type: string
        type: array
    type: object
  resource.storeResourceRequest:
    properties:
      content:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    required:
    - content
    type: object
  session.ArchiveResult:
    properties:
      archived_at:
        type: string
      head_hash:
        type: string
      messages:
        type: integer
      path:
        type: string
      ref_name:
        type: string
      resource_id:
        type: string
      session_id:
        type: string
    type: object
  session.Message:
    properties:
      content:
        type: string
      context_hash:
        type: string
      created_at:
        type: string
      hash:
        type: string
      parent_hash:
        type: string
      role:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/session.MessageToolCall'
        type: array
      usage:
        type: object
    type: object
  session.MessageToolCall:
    properties:
      arguments:
        additionalProperties: {}
        type: object
      id:
        type: string
      is_error:
        type: boolean
      name:
        type: string
      result:
        type: string
    type: object
  session.SessionMetadata:
    properties:
      archive_path:
        description: ArchivePath is the resource path the envelope was stored under.
        type: string
      archive_resource_id:
        description: |-
          ArchiveResourceID is the resource-store ID of the archive envelope,
          when the session has been archived through a ResourcePlugin.
        type: string
      archived_at:
        description: |-
          ArchivedAt is non-nil when the session has been archived. Archived
          sessions are immutable: ref/commit writes return 409.
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      model:
        type: string
      name:
        type: string
      parent:
        type: string
      plugins:
        description: |-
          Plugins restricts which plugin namespaces are active for this session.
          When non-empty, only the listed namespaces appear in the system prompt
          and are offered as callable tools. Built-in namespaces (sessions,
          resource) always remain active regardless of this list.
        items:
          type: string
        type: array
      title:
        type: string
      tools_verbosity:
        description: |-
          ToolsVerbosity controls how much plugin/tool guidance appears in the
          assembled system prompt: "full" (default) includes plugin prose and
          per-tool annotations; "basic" includes only plugin-level prose; "none"
          omits all plugin and tool blocks entirely.
        type: string
      updated_at:
        type: string
      usage:
        description: |-
          Usage aggregates provider-reported token consumption across every
          turn commited against this session. Updated atomically with each
          assistant message that carries a usage report.
        type: object
    type: object
  session.archiveRequest:
    properties:
      name:
        type: string
      ref:
        type: string
    type: object
  session.cloneRequest:
    properties:
      name:
        type: string
    type: object
  session.compactResult:
    properties:
      after:
        type: integer
      before:
        type: integer
      deleted:
        type: integer
    type: object
  session.createSessionRequest:
    properties:
      description:
        type: string
      model:
        type: string
      name:
        type: string
      parent:
        type: string
      plugins:
        items:
          type: string
        type: array
      title:
        type: string
      tools_verbosity:
        type: string
    required:
    - model
    type: object
  session.refCreateRequest:
    properties:
      hash:
        type: string
      name:
        type: string
    required:
    - hash
    - name
    type: object
  session.refUpdateRequest:
    properties:
      checkout:
        type: string
      expected_hash:
        type: string
      hash:
        type: string
      name:
        type: string
    type: object
  session.updateSessionRequest:
    properties:
      description:
        type: string
      model:
        type: string
      name:
        type: string
      title:
        type: string
    type: object
  system.verifyRequest:
    properties:
      all:
        type: boolean
      ref:
        type: string
      session_id:
        type: string
    type: object
  tools.executeBody:
    properties:
      arguments:
        additionalProperties: {}
        type: object
    type: object
info:
  contact: {}
paths:
  /v1/contexts/{hash}:
    get:
      description: Returns the raw PromptContext blob for a hash. The materialized
        form is at GET /v1/contexts/{hash}/materialized.
      parameters:
      - description: PromptContext hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get prompt context
      tags:
      - contexts
  /v1/contexts/{hash}/materialized:
    get:
      description: Resolves a PromptContext's referenced message hashes into a fully
        expanded chat slice.
      parameters:
      - description: PromptContext hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Materialize prompt context
      tags:
      - contexts
  /v1/contexts/{hash}/replay:
    post:
      consumes:
      - application/json
      description: Re-commits a stored PromptContext to a provider and streams the
        response as NDJSON. The original session is not modified; this is purely a
        debugging surface.
      parameters:
      - description: PromptContext hash
        in: path
        name: hash
        required: true
        type: string
      - description: Optional model + options override
        in: body
        name: body
        schema:
          $ref: '#/definitions/pipeline.replayRequest'
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: NDJSON stream; one event per line
          schema:
            $ref: '#/definitions/pipeline.WireEvent'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Replay prompt context
      tags:
      - contexts
  /v1/health:
    get:
      description: Returns OK when the server is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /v1/plugins/:
    get:
      description: Returns info for all loaded plugin drivers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/plugins.PluginDriverInfo'
              type: array
            type: object
      summary: List plugins
      tags:
      - plugins
  /v1/plugins/{name}:
    get:
      description: Returns info for a single plugin driver by name
      parameters:
      - description: Plugin name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/plugins.PluginDriverInfo'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get plugin
      tags:
      - plugins
  /v1/plugins/{name}/capabilities:
    get:
      description: Returns the capability set advertised by a plugin driver
      parameters:
      - description: Plugin name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get plugin capabilities
      tags:
      - plugins
  /v1/provider/:
    get:
      description: Returns names of all loaded provider plugins
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                type: string
              type: array
            type: object
      summary: List providers
      tags:
      - provider
  /v1/provider/{name}:
    get:
      description: Returns info for a single provider plugin by name
      parameters:
      - description: Provider name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get provider
      tags:
      - provider
  /v1/provider/{name}/models:
    get:
      description: Returns all models available from a provider
      parameters:
      - description: Provider name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List models
      tags:
      - provider
  /v1/provider/{name}/models/{model}:
    get:
      description: Returns info for a single model from a provider
      parameters:
      - description: Provider name
        in: path
        name: name
        required: true
        type: string
      - description: Model name
        in: path
        name: model
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get model
      tags:
      - provider
  /v1/provider/embed:
    post:
      consumes:
      - application/json
      description: |-
        Returns embedding vectors for the given content using the specified model.
        model accepts "provider/model" or a forge alias (e.g. "forge/my-embed").
      parameters:
      - description: '{ model: string, content: string }'
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Embed text
      tags:
      - provider
  /v1/provider/models:
    get:
      description: Returns all models from every provider alongside locally configured
        model templates
      parameters:
      - description: Filter local models by type (chat|embed)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all models
      tags:
      - provider
  /v1/resources:
    get:
      description: Returns the active storage backend for resources.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Resource status
      tags:
      - resource
  /v1/resources/{path}:
    delete:
      description: Removes the resource at the given path. Requires ?id=<id>.
      parameters:
      - description: Resource path
        in: path
        name: path
        required: true
        type: string
      - description: Resource ID
        in: query
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Forget a resource
      tags:
      - resource
    get:
      description: Lists all resources at the given path. Pass ?id=<id> to fetch a
        single resource.
      parameters:
      - description: Resource path
        in: path
        name: path
        required: true
        type: string
      - description: Resource ID (fetch single)
        in: query
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List or get resources
      tags:
      - resource
    patch:
      consumes:
      - application/json
      description: Updates tags and metadata for an existing resource without changing
        its content or advancing the content ref. Requires ?name=<name>.
      parameters:
      - description: Resource namespace path
        in: path
        name: path
        required: true
        type: string
      - description: Resource name (ref key)
        in: query
        name: name
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/resource.patchResourceRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Patch resource metadata
      tags:
      - resource
    post:
      consumes:
      - application/json
      description: Search resources by path glob, content query, tags, metadata predicates,
        and time range. Path from URL is the default; body fields override it.
      parameters:
      - description: Default path or glob
        in: path
        name: path
        required: true
        type: string
      - description: RecallQuery overrides (path, query, tags, filter, created_after,
          created_before, limit)
        in: body
        name: body
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Recall resources
      tags:
      - resource
    put:
      consumes:
      - application/json
      description: Persists a resource at the path given in the URL.
      parameters:
      - description: Resource path (e.g. /sessions/abc123)
        in: path
        name: path
        required: true
        type: string
      - description: Resource body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/resource.storeResourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Store a resource
      tags:
      - resource
  /v1/sessions:
    get:
      description: Returns all sessions, optionally filtered by parent ID. Archived
        sessions are excluded by default.
      parameters:
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Max results (default 20)
        in: query
        name: limit
        type: integer
      - description: Filter by parent session ID
        in: query
        name: parent
        type: string
      - description: Include archived sessions instead of active ones
        in: query
        name: archived
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/session.SessionMetadata'
              type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List sessions
      tags:
      - sessions
    post:
      consumes:
      - application/json
      description: Creates a new session
      parameters:
      - description: Session options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/session.createSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/session.SessionMetadata'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create session
      tags:
      - sessions
  /v1/sessions/{id}/messages/summarize:
    patch:
      description: Summarizes the session history into a compressed context message
        (not yet implemented)
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "501":
          description: Not Implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Summarize messages
      tags:
      - sessions
  /v1/sessions/{session_id}:
    delete:
      description: Permanently deletes a session and all its data. Only archived sessions
        may be deleted; archive the session first to preserve its history as a resource.
      parameters:
      - description: Session ID or name
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete session
      tags:
      - sessions
    get:
      description: Returns metadata for a single session by ID or name
      parameters:
      - description: Session ID or name
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/session.SessionMetadata'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get session
      tags:
      - sessions
    patch:
      consumes:
      - application/json
      description: Patches mutable metadata on a session. Only provided fields are
        updated.
      parameters:
      - description: Session ID or name
        in: path
        name: session_id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/session.updateSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/session.SessionMetadata'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update session
      tags:
      - sessions
  /v1/sessions/{session_id}/archive:
    post:
      consumes:
      - application/json
      description: Walks the named ref (default HEAD), stores an envelope through
        the resource layer, and flips the session to immutable.
      parameters:
      - description: Session ID or name
        in: path
        name: session_id
        required: true
        type: string
      - description: Archive options
        in: body
        name: body
        schema:
          $ref: '#/definitions/session.archiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/session.ArchiveResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Archive session
      tags:
      - sessions
  /v1/sessions/{session_id}/branch:
    get:
      description: Returns all refs (HEAD + branches) for a session as a name -> hash
        map.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List session branches
      tags:
      - sessions
    post:
      consumes:
      - application/json
      description: Creates a named branch pointing at a message hash. Fails with 409
        when the ref already exists.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Branch to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/session.refCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create session branch
      tags:
      - sessions
  /v1/sessions/{session_id}/branch/{ref}:
    delete:
      description: Removes a branch ref. Missing refs are not an error.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Ref name
        in: path
        name: ref
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete session branch
      tags:
      - sessions
    patch:
      consumes:
      - application/json
      description: Atomically advances or renames a branch. Set "hash" to move (CAS
        when "expected_hash" is also set). Set "name" to rename — returns 409 if the
        target name already exists.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Current ref name
        in: path
        name: ref
        required: true
        type: string
      - description: Move or rename payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/session.refUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Move or rename branch
      tags:
      - sessions
  /v1/sessions/{session_id}/branch/{ref}/revert:
    post:
      consumes:
      - application/json
      description: CAS-moves the named ref to the target hash, orphaning messages
        between the current tip and the target. Prefer fork_from on /pipeline/commit
        for non-destructive branching.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Ref name
        in: path
        name: ref
        required: true
        type: string
      - description: Body with 'to' field (target hash)
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Hard-revert a session branch
      tags:
      - sessions
  /v1/sessions/{session_id}/clone:
    post:
      consumes:
      - application/json
      description: Replays an archive envelope into a fresh live session whose HEAD
        points at the archived tip.
      parameters:
      - description: Source session ID, name, or archive resource ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Clone options
        in: body
        name: body
        schema:
          $ref: '#/definitions/session.cloneRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/session.SessionMetadata'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Clone archived session
      tags:
      - sessions
  /v1/sessions/{session_id}/messages:
    get:
      description: Returns messages for a session in chronological order
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Skip N most-recent messages (HEAD-anchored; offset=1 omits the
          latest message)
        in: query
        name: offset
        type: integer
      - description: Max results (default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/session.Message'
              type: array
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List messages
      tags:
      - sessions
  /v1/sessions/{session_id}/messages/{msg_id}:
    get:
      description: Returns a single message by ID
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Message ID
        in: path
        name: msg_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/session.Message'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get message
      tags:
      - sessions
  /v1/sessions/{session_id}/messages/{msg_id}/diff:
    get:
      description: Returns a Myers diff on the Content field of two message objects
        identified by their content hashes.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: First message hash (or prefix)
        in: path
        name: msg_id
        required: true
        type: string
      - description: Second message hash (or prefix)
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Diff two messages
      tags:
      - sessions
  /v1/sessions/{session_id}/messages/compact:
    patch:
      description: Removes intermediate tool call and tool result messages to reduce
        context size
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/session.compactResult'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Compact messages
      tags:
      - sessions
  /v1/sessions/{session_id}/system/reset:
    post:
      consumes:
      - application/json
      description: Re-assembles the system prompt from current plugin state and stores
        it as the root message. Creates a fork branch when HEAD is non-empty.
      parameters:
      - description: Session ID or name
        in: path
        name: session_id
        required: true
        type: string
      - description: Reset options
        in: body
        name: body
        schema:
          $ref: '#/definitions/pipeline.systemResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reset system snapshot
      tags:
      - sessions
  /v1/sessions/commit:
    post:
      consumes:
      - application/json
      description: Appends a user message to the given session and streams the pipeline
        response as NDJSON. Each line is a WireEvent JSON object.
      parameters:
      - description: Commit request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pipeline.commitRequest'
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: NDJSON stream; one event per line
          schema:
            $ref: '#/definitions/pipeline.WireEvent'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Commit message
      tags:
      - pipeline
  /v1/sessions/preview:
    post:
      consumes:
      - application/json
      description: Returns the assembled system prompt and chat-message slice that
        would be sent to the provider, without persisting the new user message or
        calling the LLM. Use to debug prompt composition.
      parameters:
      - description: Preview request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pipeline.previewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipeline.previewResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Preview pipeline input
      tags:
      - pipeline
  /v1/system/dag/diff:
    get:
      description: Fetches both objects, computes a unified diff of their canonical
        JSON, and returns it as text/plain.
      parameters:
      - description: Hash A
        in: query
        name: a
        required: true
        type: string
      - description: Hash B
        in: query
        name: b
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Unified diff
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Diff two DAG objects
      tags:
      - system
  /v1/system/dag/gc:
    post:
      description: Walks every session ref, marks reachable objects, and deletes (or
        reports) the rest. ?dry_run=true returns stats without deleting.
      parameters:
      - description: Report without deleting
        in: query
        name: dry_run
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Garbage-collect DAG objects
      tags:
      - system
  /v1/system/dag/objects:
    get:
      description: ?list=false (default) returns {"count":N}. ?list=true streams NDJSON
        of {hash, shard}. ?prefix=<xx> filters by 2-char shard prefix.
      parameters:
      - description: 2-char shard prefix
        in: query
        name: prefix
        type: string
      - description: Stream object entries instead of counting
        in: query
        name: list
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List or count DAG objects
      tags:
      - system
  /v1/system/dag/objects/{hash}:
    get:
      description: Returns the raw canonical JSON for a content-addressed object.
        ?pretty=true indents the output. Prefix matching (>=4 hex chars) resolved
        server-side. Sets X-Forge-Object-Type header.
      parameters:
      - description: Full or prefix (>=4 chars) SHA-256 hex hash
        in: path
        name: hash
        required: true
        type: string
      - description: Indent output
        in: query
        name: pretty
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Fetch a DAG object
      tags:
      - system
  /v1/system/dag/objects/{hash}/type:
    get:
      description: Returns the type of a DAG object without fetching its full body.
      parameters:
      - description: Full or prefix (>=4 chars) SHA-256 hex hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Detect object type
      tags:
      - system
  /v1/system/dag/sessions/{id}/log:
    get:
      description: Returns NDJSON of {hash, short_hash, role, preview, created_at}
        walking from the ref tip to the root. Mirrors git log --oneline.
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Ref name (default: HEAD)'
        in: query
        name: ref
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: NDJSON stream
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Walk session log
      tags:
      - system
  /v1/system/dag/verify:
    post:
      consumes:
      - application/json
      description: Walks reachable objects from the given ref, re-hashes each blob,
        and reports mismatches or missing parents.
      parameters:
      - description: Verify options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/system.verifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Verify DAG integrity
      tags:
      - system
  /v1/system/gc:
    post:
      description: Walks every session ref, marks reachable objects, and deletes everything
        else from the object store.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Garbage-collect unreachable objects
      tags:
      - system
  /v1/system/monitor:
    get:
      description: Opens a long-lived connection and streams formatted log lines,
        one per chunk. ?level= filters (trace/debug/info/warn/error). Disconnect to
        stop.
      parameters:
      - description: 'Minimum log level (default: info)'
        in: query
        name: level
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: newline-delimited log lines
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Stream server logs
      tags:
      - system
  /v1/tools/:
    get:
      description: Returns definitions for all registered tools across all namespaces
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: List all tools
      tags:
      - tools
  /v1/tools/{namespace}:
    get:
      description: Returns definitions for all tools in the given namespace
      parameters:
      - description: Tool namespace
        in: path
        name: namespace
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List tools by namespace
      tags:
      - tools
  /v1/tools/{namespace}/{name}:
    get:
