      - description: Tool namespace
        in: path
        name: namespace
        required: true
        type: string
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tool
      tags:
      - tools
  /v1/tools/{namespace}/{name}/execute:
    post:
      consumes:
      - application/json
      description: Executes a tool by namespace and name with the provided arguments
      parameters:
      - description: Tool namespace
        in: path
        name: namespace
        required: true
        type: string
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Execution arguments
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/tools.executeBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute tool
      tags:
      - tools
  /v1/tools/{namespace}/{name}/execute/{callid}:
    post:
      consumes:
      - application/json
      description: Executes a tool by namespace and name, associating the result with
        the given call ID
      parameters:
      - description: Tool namespace
        in: path
        name: namespace
        required: true
        type: string
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Call ID
        in: path
        name: callid
        required: true
        type: string
      - description: Execution arguments
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/tools.executeBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute tool with call ID
      tags:
      - tools
