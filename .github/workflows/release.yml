name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          path: service

      - uses: actions/checkout@v4
        with:
          repository: mwantia/forge-sdk
          path: shared

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: Build binary
        working-directory: service
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -a \
            -ldflags "-s -w -extldflags '-static' -X main.version=${{ github.ref_name }}" \
            -trimpath \
            -o forge-linux-${{ matrix.goarch }} \
            ./cmd/forge/

      - uses: actions/upload-artifact@v4
        with:
          name: forge-linux-${{ matrix.goarch }}
          path: service/forge-linux-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: forge-linux-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
