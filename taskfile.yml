version: '3'

env:
    CGO_ENABLED: '0'
    GOOS: linux
    MAIN_PATH: ./cmd/forge/
    BUILD_PATH: ./build/forge
    TEST_CONFIG_PATH: ./tests/config/

dotenv: ['.env']

tasks:
    default:
        desc: List all available tasks
        cmds:
        - task --list
        silent: true

    setup:
        desc: Download and tidy Go module dependencies
        cmds:
        - go mod download
        - go mod tidy

    generate:
        desc: Generate plugin_*.go files from plugins.yaml
        cmds:
        - go run ./tools/plugins -manifest plugins.yaml -out cmd/forge
        - task: setup

    ui:templ:
        desc: Regenerate Go code from .templ template files
        cmds:
        - templ generate ./internal/application/ui/...
        sources:
        - internal/application/ui/templates/**/*.templ

    ui:css:
        desc: Compile Tailwind CSS for embedded assets (requires Node)
        dir: internal/application/ui
        cmds:
        - npx tailwindcss@3 -c tailwind.config.js -i assets/app.src.css -o assets/app.css --minify
        sources:
        - templates/**/*.templ

    ui:
        desc: Regenerate all UI artifacts (templates + CSS)
        deps: [ui:templ, ui:css]

    build:
        desc: Compile the project into a static binary
        cmds:
        - task: generate
        - task: ui:templ
        - go build -tags all -a -ldflags '-s -w -extldflags "-static"' -trimpath -o ${BUILD_PATH} ${MAIN_PATH}

    run:
        desc: Run the agent with the test configuration
        cmds:
        - task: build
        - ${BUILD_PATH} agent --config ${TEST_CONFIG_PATH}
        ignore_error: true

    release:
        desc: Build and push multi-arch Docker image to registry
        cmds:
        - task: setup
        - docker buildx create --use --name multi-arch-builder || true
        - docker login ${DOCKER_REGISTRY} && docker buildx build --push --platform ${DOCKER_PLATFORMS} -t ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_VERSION} -t ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_LATEST} .

    clean:
        desc: Remove generated files and workspace (go.work, plugins.go)
        cmds:
        - rm -f go.work go.work.sum
        - rm -f cmd/forge/plugins.go

    release-local:
        desc: Build and push multi-arch image using Dockerfile.local (local plugin sources, context = ../.. to include fabric/)
        cmds:
        - docker buildx create --use --name multi-arch-builder || true
        - docker login ${DOCKER_REGISTRY} && docker buildx build --push --platform ${DOCKER_PLATFORMS} -f Dockerfile.local -t ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_VERSION} -t ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_LATEST} .