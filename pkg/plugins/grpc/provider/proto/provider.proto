syntax = "proto3";

package provider;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge/pkg/plugins/grpc/provider/proto";

service ProviderService {
    rpc Chat(ChatReq)                    returns (stream ChatChunk);
    rpc Embed(EmbedReq)                  returns (EmbedResp);
    rpc ListModels(ListModelsReq)        returns (ListModelsResp);
    rpc CreateModel(CreateModelReq)      returns (CreateModelResp);
    rpc GetModel(GetModelReq)            returns (GetModelResp);
    rpc DeleteModel(DeleteModelReq)      returns (DeleteModelResp);
}

// --- Chat ---

message ChatReq {
    string                model       = 1;
    repeated MessageProto messages    = 2;
    double                temperature = 3;
    int32                 max_tokens  = 4;
    repeated ToolDefProto tools       = 5;
    map<string, string>   metadata    = 6;
}

message ChatChunk {
    string                   id         = 1;
    string                   role       = 2;
    string                   delta      = 3;
    bool                     done       = 4;
    repeated ToolCallProto   tool_calls = 5;
    string                   model      = 6;
}

message MessageProto {
    string                 role       = 1;
    string                 content    = 2;
    repeated ToolCallProto tool_calls = 3;
}

message ToolDefProto {
    string                 name        = 1;
    string                 description = 2;
    google.protobuf.Struct parameters  = 3;
}

message ToolCallProto {
    string                 id        = 1;
    string                 name      = 2;
    google.protobuf.Struct arguments = 3;
}

// --- Embed ---

message EmbedReq {
    string model   = 1;
    string content = 2;
}

message EmbedResp {
    repeated EmbeddingProto embeddings = 1;
}

message EmbeddingProto {
    repeated float values = 1;
}

// --- Models ---

message ListModelsReq {}

message ListModelsResp {
    repeated ModelProto models = 1;
}

message CreateModelReq {
    string              name            = 1;
    string              base_model      = 2;
    string              prompt_template = 3;
    string              system          = 4;
    map<string, string> parameters      = 5;
}

message CreateModelResp {
    ModelProto model = 1;
}

message GetModelReq {
    string name = 1;
}

message GetModelResp {
    ModelProto model = 1;
}

message DeleteModelReq {
    string name = 1;
}

message DeleteModelResp {
    bool success = 1;
}

message ModelProto {
    string              name      = 1;
    int32               dimension = 2;
    map<string, string> metadata  = 3;
}
