syntax = "proto3";

package tools;

option go_package = "github.com/mwantia/forge/pkg/plugins/grpc/tools/proto";

service ToolsService {
    rpc List(ListToolsReq)    returns (ListToolsResp);
    rpc Execute(ExecuteReq)   returns (ExecuteResp);
}

message ListToolsReq {}

message ListToolsResp {
    repeated ToolDefProto tools = 1;
}

message ToolDefProto {
    string              name        = 1;
    string              description = 2;
    map<string, string> parameters  = 3;
}

message ExecuteReq {
    string              tool      = 1;
    map<string, string> arguments = 2;
}

message ExecuteResp {
    map<string, string> result   = 1;
    bool                is_error = 2;
}
