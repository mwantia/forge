syntax = "proto3";

package tools;

import "google/protobuf/struct.proto";

option go_package = "github.com/mwantia/forge/pkg/plugins/grpc/tools/proto";

service ToolsService {
    rpc List(ListToolsReq)    returns (ListToolsResp);
    rpc Execute(ExecuteReq)   returns (ExecuteResp);
}

message ListToolsReq {}

message ListToolsResp {
    repeated ToolDefProto tools = 1;
}

message ToolDefProto {
    string                 name        = 1;
    string                 description = 2;
    google.protobuf.Struct parameters  = 3;
}

message ExecuteReq {
    string                 tool      = 1;
    google.protobuf.Struct arguments = 2;
    string                 call_id   = 3;
}

message ExecuteResp {
    google.protobuf.Value result   = 1;
    bool                  is_error = 2;
}
